seed: 0
device: cpu

env:
  n: 20
  radius: 0.25
  v_max: 0.02
  episode_len: 100
  motion_cost: 0.01
  r_min: 0.08
  collision_penalty: 0.1     # was 1.0 — too aggressive, drove dispersion to disconnection
  spread_bonus: 0.0          # was 0.1 — overpowered the lambda2 signal

ppo:
  total_frames: 200000
  frames_per_batch: 3200
  sub_batch_size: 256
  num_epochs: 10
  clip_epsilon: 0.2
  gamma: 0.99
  lmbda: 0.95
  entropy_coef: 0.01
  critic_coef: 1.0
  lr: 3.0e-4
  max_grad_norm: 1.0
  hidden_sizes: [128, 128]
