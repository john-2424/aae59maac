seed: 0
device: cpu

env:
  n: 20
  episode_len: 64
  reward_beta: 0.0           # remove cost confound; gamma still penalizes disconnection
  reward_gamma: 1.0

ppo:
  total_frames: 400000       # 2x prior; discrete action space needs more samples
  frames_per_batch: 4096
  sub_batch_size: 256
  num_epochs: 10
  clip_epsilon: 0.2
  gamma: 0.99
  lmbda: 0.95
  entropy_coef: 0.01         # was 0.0 — discrete head was too greedy
  critic_coef: 1.0
  lr: 3.0e-4
  max_grad_norm: 1.0
  hidden_sizes: [128, 128]

eval:
  n_episodes: 32
  graph_families_heldout: [erdos_renyi]
