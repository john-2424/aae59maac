seed: 0
device: cpu

env:
  graph_families: [erdos_renyi]
  n: 20
  w_max: 1.0
  budget: 25.0              # tight: m ≈ 42 edges, so uniform must trade off
  episode_len: 32
  consensus_alpha: null
  consensus_T: 50
  reward_beta: 0.0
  reward_gamma: 0.0

ppo:
  total_frames: 300000
  frames_per_batch: 4096
  sub_batch_size: 256
  num_epochs: 10
  clip_epsilon: 0.2
  gamma: 0.99
  lmbda: 0.95
  entropy_coef: 0.005
  critic_coef: 1.0
  lr: 3.0e-4
  max_grad_norm: 1.0
  hidden_sizes: [128, 128]

eval:
  n_episodes: 32
  graph_families_heldout: [erdos_renyi]
